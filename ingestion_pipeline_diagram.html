<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LangGraph Ingestion Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #0d1117;
    --surface:  #161b26;
    --surface2: #1e2535;
    --border:   #2d3548;
    --border2:  #232840;
    --text:     #e2e8f8;
    --text2:    #8892b0;
    --mono:     'Roboto Mono', monospace;
    --sans:     'Roboto', sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);padding:28px 20px 60px}
  h1{font-size:20px;font-weight:700;letter-spacing:.2px}
  .sub{font-size:12px;color:var(--text2);font-family:var(--mono);margin-top:4px}
  .hdr{max-width:1060px;margin:0 auto 22px}
  .card{max-width:1060px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 18px 36px;overflow-x:auto}
  .legend{display:flex;flex-wrap:wrap;gap:10px 20px;margin-bottom:22px;padding:12px 16px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px}
  .li{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--text2)}
  .ls{width:11px;height:11px;border-radius:3px;flex-shrink:0}
  .ll{width:20px;border-top:2px dashed #4a5068}
  svg{display:block;width:100%;min-width:820px}
  #tip{position:fixed;pointer-events:none;background:#151c30;border:1px solid #3a4a8a;border-radius:8px;padding:8px 12px;font-size:11.5px;color:#b0bcd8;max-width:290px;line-height:1.6;z-index:999;opacity:0;transition:opacity .12s;font-family:var(--sans)}
  .nb{cursor:pointer;transition:opacity .12s}.nb:hover{opacity:.78}
  /* SVG text classes */
  .bl{font-family:'Roboto Mono',monospace;font-size:11px;letter-spacing:.5px}
  .nt{font-family:'Roboto Mono',monospace;font-size:12.5px;font-weight:500}
  .ns{font-family:'Roboto',sans-serif;font-size:11px}
  .el{font-family:'Roboto',sans-serif;font-size:11px;fill:#6878b8}
  .cl{font-family:'Roboto Mono',monospace;font-size:10px;fill:#4a5a72}
</style>
</head>
<body>
<div class="hdr">
  <h1>LangGraph Ingestion Pipeline</h1>
  <p class="sub">Document → Docling → iiRDS tagging → Embeddings → Neo4j · gpt-4o-mini · text-embedding-3-small</p>
</div>
<div class="card">
  <div class="legend">
    <div class="li"><div class="ls" style="background:#1e3a5f;border:1px solid #2d6aa0"></div>Intake / validation</div>
    <div class="li"><div class="ls" style="background:#1a3828;border:1px solid #2a6644"></div>Parse (Docling)</div>
    <div class="li"><div class="ls" style="background:#2a2060;border:1px solid #5040b0"></div>Chunking</div>
    <div class="li"><div class="ls" style="background:#2e1f00;border:1px solid #8a5500"></div>iiRDS tagging</div>
    <div class="li"><div class="ls" style="background:#1e1040;border:1px solid #5030a0"></div>Embedding</div>
    <div class="li"><div class="ls" style="background:#0a2a1a;border:1px solid #1a6644"></div>Neo4j write</div>
    <div class="li"><div class="ls" style="background:#1a1030;border:1px solid #4428a0"></div>Receipt / log</div>
    <div class="li"><div class="ls" style="background:#3a1010;border:1px solid #882020"></div>Error / terminal</div>
    <div class="li"><div class="ls" style="background:#3a1a00;border:1px solid #906020"></div>Human review</div>
    <div class="li"><div class="ll"></div>Fallback / dashed path</div>
  </div>

  CX=460  CL=260  CR=660  NODE_W=400
  LEFT branch: x=30  w=180  cx=120
  RIGHT branch: x=710  w=180  cx=800

  START       y=20   h=44  bot=64

  BAND2       y=324        bot=444
    parse     y=352  h=64  bot=416
  err_parse   y=352  h=44  (right x=710)
  BAND3       y=494        bot=614
    chunk     y=522  h=64  bot=586
  BAND4       y=664        bot=784
    tag_iirds y=692  h=64  bot=756

<svg viewBox="0 0 920 1472" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="LangGraph Ingestion Pipeline Architecture Diagram">
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ═══════════════════════════════════════════════════════════════
     BAND BACKGROUNDS
═══════════════════════════════════════════════════════════════ -->
<!-- Band 1: Intake -->
<rect x="12" y="94" width="896" height="120" rx="10" fill="#0e1820" stroke="#1e3050" stroke-width="1" stroke-dasharray="5 4"/>
<text class="bl" x="28" y="111" fill="#2d6aa0">STAGE 1 — DOCUMENT INTAKE</text>

<!-- Band 2: Parse -->
<rect x="12" y="324" width="896" height="120" rx="10" fill="#0e1a10" stroke="#1a3828" stroke-width="1" stroke-dasharray="5 4"/>
<text class="bl" x="28" y="341" fill="#2a6644">STAGE 2 — DOCLING PARSE</text>

<!-- Band 3: Chunk -->
<rect x="12" y="494" width="896" height="120" rx="10" fill="#100e20" stroke="#2a2060" stroke-width="1" stroke-dasharray="5 4"/>
<text class="bl" x="28" y="511" fill="#5040b0">STAGE 3 — STRUCTURAL CHUNKING</text>

<!-- Band 4: iiRDS Tag -->
<rect x="12" y="664" width="896" height="120" rx="10" fill="#120e00" stroke="#4a3010" stroke-width="1" stroke-dasharray="5 4"/>
<text class="bl" x="28" y="681" fill="#8a5500">STAGE 4 — iiRDS METADATA TAGGING</text>

<!-- Band 5: Embed -->
<rect x="12" y="898" width="896" height="120" rx="10" fill="#0a0818" stroke="#2a1860" stroke-width="1" stroke-dasharray="5 4"/>
<text class="bl" x="28" y="915" fill="#5030a0">STAGE 5 — EMBEDDING GENERATION</text>

<!-- Band 6: Neo4j write -->
<rect x="12" y="1068" width="896" height="120" rx="10" fill="#061410" stroke="#143820" stroke-width="1" stroke-dasharray="5 4"/>
<text class="bl" x="28" y="1085" fill="#1a6644">STAGE 6 — NEO4J WRITE (ATOMIC)</text>

<!-- Band 7: Receipt -->
<rect x="12" y="1238" width="896" height="120" rx="10" fill="#080616" stroke="#221460" stroke-width="1" stroke-dasharray="5 4"/>
<text class="bl" x="28" y="1255" fill="#4428a0">STAGE 7 — INGESTION RECEIPT</text>


<!-- ═══════════════════════════════════════════════════════════════
     START NODE
═══════════════════════════════════════════════════════════════ -->
<g class="nb" data-tip="Entry point. Called as: python ingest_document.py &lt;path&gt;. Initialises LangGraph state with file_path and a unique thread_id stored in SQLite checkpointer for run tracking and human-review resume.">
  <rect x="260" y="20" width="400" height="44" rx="8" fill="#1c2240" stroke="#3a4a80" stroke-width="1"/>
  <text class="nt" x="460" y="37" text-anchor="middle" dominant-baseline="central" fill="#c0cce8">START</text>
  <text class="ns" x="460" y="54" text-anchor="middle" dominant-baseline="central" fill="#7080a8">python ingest_document.py &lt;path&gt;</text>
</g>
<!-- START → intake -->
<line x1="460" y1="64" x2="460" y2="120" stroke="#3a4a80" stroke-width="1.5" marker-end="url(#ar)"/>


<!-- ═══════════════════════════════════════════════════════════════
     STAGE 1 — INTAKE
═══════════════════════════════════════════════════════════════ -->
<g class="nb" data-tip="Validates file exists and format is supported (PDF, DOCX, HTML, XML, TXT, MD). Computes SHA-256 hash of raw bytes. Queries Neo4j: if a Document node with this hash already exists, pipeline terminates with a DUPLICATE status — no re-ingestion supported.">
  <rect x="260" y="122" width="400" height="64" rx="8" fill="#1e3a5f" stroke="#2d6aa0" stroke-width="1"/>
  <text class="nt" x="460" y="144" text-anchor="middle" dominant-baseline="central" fill="#90c0e8">intake</text>
  <text class="ns" x="460" y="165" text-anchor="middle" dominant-baseline="central" fill="#5090c0">Validate · compute SHA-256 · duplicate check</text>
</g>

<!-- intake → duplicate (left) -->
<path d="M260 154 L180 154 L180 276 L212 276"
      fill="none" stroke="#882020" stroke-width="1.5" marker-end="url(#ar)"/>
<text class="el" x="190" y="148" fill="#884040">duplicate</text>

<!-- duplicate END node (left) -->
<g class="nb" data-tip="Hard terminal. Document with this SHA-256 hash already exists in Neo4j. Pipeline exits with a clear message. Re-ingestion is not supported — update the source document and ingest as a new file.">
  <rect x="30" y="254" width="180" height="44" rx="8" fill="#3a1010" stroke="#882020" stroke-width="1"/>
  <text class="nt" x="120" y="271" text-anchor="middle" dominant-baseline="central" fill="#e08080">END — duplicate</text>
  <text class="ns" x="120" y="288" text-anchor="middle" dominant-baseline="central" fill="#a05050">skip with message</text>
</g>

<!-- intake → parse (down) -->
<line x1="460" y1="186" x2="460" y2="236" stroke="#2d6aa0" stroke-width="1.5" marker-end="url(#ar)"/>
<text class="el" x="476" y="217">valid doc</text>

<!-- routing label between band1 and band2 -->
<text class="cl" x="460" y="255" text-anchor="middle">hash stored in state · raw bytes passed forward</text>

<!-- gap arrow into band2 -->
<line x1="460" y1="262" x2="460" y2="350" stroke="#2a6644" stroke-width="1.5" marker-end="url(#ar)"/>


<!-- ═══════════════════════════════════════════════════════════════
     STAGE 2 — DOCLING PARSE
═══════════════════════════════════════════════════════════════ -->
<g class="nb" data-tip="Runs fully locally — no API calls. Docling uses DocLayNet (CNN layout detection) and TableFormer (transformer table recognition). OCR enabled for scanned PDFs. Returns a structured DoclingDocument tree with section headings, paragraphs, tables, lists, and warnings clearly typed. Writes raw bytes to a temp file then deletes it after parse.">
  <rect x="260" y="352" width="400" height="64" rx="8" fill="#1a3828" stroke="#2a6644" stroke-width="1"/>
  <text class="nt" x="460" y="374" text-anchor="middle" dominant-baseline="central" fill="#80d0a0">parse</text>
  <text class="ns" x="460" y="395" text-anchor="middle" dominant-baseline="central" fill="#50a070">DocLayNet · TableFormer · OCR · local only</text>
</g>

<!-- parse → error (right) -->
<path d="M660 384 L700 384 L700 374 L708 374"
      fill="none" stroke="#882020" stroke-width="1.5" marker-end="url(#ar)"/>
<text class="el" x="664" y="379" fill="#884040">parse failed</text>

<!-- parse error END (right) -->
<g class="nb" data-tip="Hard terminal. Docling could not parse this document — corrupted file, unsupported encoding, or zero-content result. Check the log for the specific Docling error. Cannot recover without fixing the source document.">
  <rect x="710" y="352" width="180" height="44" rx="8" fill="#3a1010" stroke="#882020" stroke-width="1"/>
  <text class="nt" x="800" y="369" text-anchor="middle" dominant-baseline="central" fill="#e08080">END — parse error</text>
  <text class="ns" x="800" y="386" text-anchor="middle" dominant-baseline="central" fill="#a05050">unrecoverable · check log</text>
</g>

<!-- parse → chunk -->
<line x1="460" y1="416" x2="460" y2="445" stroke="#2a6644" stroke-width="1.5" marker-end="url(#ar)"/>
<text class="el" x="476" y="436">success</text>
<text class="cl" x="460" y="462" text-anchor="middle">DoclingDocument tree in state · title · page_count</text>
<line x1="460" y1="468" x2="460" y2="520" stroke="#5040b0" stroke-width="1.5" marker-end="url(#ar)"/>


<!-- ═══════════════════════════════════════════════════════════════
     STAGE 3 — STRUCTURAL CHUNKING
═══════════════════════════════════════════════════════════════ -->
<g class="nb" data-tip="Content-type aware strategy. Tables → always one chunk (TableFormer data kept intact). Lists / procedures → one chunk (step ordering preserved). Warnings → one chunk (safety-critical, never fragmented). Paragraphs → split at 512 tokens with 50-token sentence-boundary overlap. Each chunk carries: parent section path, document title, content_type, position ordinal, and token count. Section headings become context metadata, not separate chunks.">
  <rect x="260" y="522" width="400" height="64" rx="8" fill="#2a2060" stroke="#5040b0" stroke-width="1"/>
  <text class="nt" x="460" y="544" text-anchor="middle" dominant-baseline="central" fill="#b0a0f0">chunk</text>
  <text class="ns" x="460" y="565" text-anchor="middle" dominant-baseline="central" fill="#8070c0">Tables whole · lists whole · text split @ 512 tok</text>
</g>

<!-- chunk content type legend (inline annotation boxes) -->
<!-- table pill -->
<rect x="148" y="530" width="96" height="20" rx="4" fill="#1a1840" stroke="#3a3080" stroke-width="0.8"/>
<text class="ns" x="196" y="544" text-anchor="middle" dominant-baseline="central" fill="#7060c0" font-size="10">table → 1 chunk</text>
<!-- list pill -->
<rect x="148" y="556" width="96" height="20" rx="4" fill="#1a1840" stroke="#3a3080" stroke-width="0.8"/>
<text class="ns" x="196" y="570" text-anchor="middle" dominant-baseline="central" fill="#7060c0" font-size="10">list → 1 chunk</text>
<!-- warning pill -->
<rect x="670" y="530" width="110" height="20" rx="4" fill="#2a1a00" stroke="#6a4000" stroke-width="0.8"/>
<text class="ns" x="725" y="544" text-anchor="middle" dominant-baseline="central" fill="#c08020" font-size="10">warning → 1 chunk</text>
<!-- paragraph pill -->
<rect x="670" y="556" width="110" height="20" rx="4" fill="#1a1840" stroke="#3a3080" stroke-width="0.8"/>
<text class="ns" x="725" y="570" text-anchor="middle" dominant-baseline="central" fill="#7060c0" font-size="10">para → split+overlap</text>

<!-- chunk → tag_iirds -->
<line x1="460" y1="586" x2="460" y2="614" stroke="#5040b0" stroke-width="1.5" marker-end="url(#ar)"/>
<text class="cl" x="460" y="630" text-anchor="middle">ChunkList in state · total_tokens · section_path per chunk</text>
<line x1="460" y1="636" x2="460" y2="690" stroke="#8a5500" stroke-width="1.5" marker-end="url(#ar)"/>


<!-- ═══════════════════════════════════════════════════════════════
     STAGE 4 — iiRDS TAGGING
═══════════════════════════════════════════════════════════════ -->
<g class="nb" data-tip="One gpt-4o-mini call per document (not per chunk) — sends first 3000 chars of document text. Extracts: product names, components, lifecycle_phase (Installation/Operation/Service/Repair/Disposal), information_type (Procedure/Concept/Warning/Specification/MaintenanceInterval/Troubleshooting), and language. Returns confidence 0.0–1.0. Retries 3x with exponential backoff on API failure. If all retries fail, stores empty tags and continues — document is not blocked by tagging failure.">
  <rect x="260" y="692" width="400" height="64" rx="8" fill="#2e1f00" stroke="#8a5500" stroke-width="1"/>
  <text class="nt" x="460" y="714" text-anchor="middle" dominant-baseline="central" fill="#f0c060">tag_iirds</text>
  <text class="ns" x="460" y="735" text-anchor="middle" dominant-baseline="central" fill="#c09030">gpt-4o-mini · 1 call/doc · retry ×3 · backoff</text>
</g>

<!-- confidence routing labels -->
<text class="el" x="250" y="782" text-anchor="end">confidence &lt; 0.5</text>
<text class="el" x="670" y="782" text-anchor="start">confidence ≥ 0.5</text>

<!-- tag → human_review (left) -->
<path d="M260 756 L120 756 L120 812"
      fill="none" stroke="#c06020" stroke-width="1.5" marker-end="url(#ar)"/>

<!-- tag → embed (center-down, skip human if confident) -->
<path d="M660 722 L880 722 L880 960 L662 960"
      fill="none" stroke="#8a5500" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ar)"/>
<text class="el" x="872" y="718" text-anchor="end">bypass (high conf.)</text>


<!-- ═══════════════════════════════════════════════════════════════
     HUMAN REVIEW NODE (left branch, y=814..878)
═══════════════════════════════════════════════════════════════ -->
<g class="nb" data-tip="LangGraph interrupt() node. Pipeline suspends here when iiRDS confidence &lt; 0.5. Full state is persisted to SQLite checkpointer. Operator is shown current tags and asked to correct them. Resume command: python review_tags.py &lt;thread_id&gt;. After correction, human_reviewed=True is set in state and pipeline continues to embed.">
  <rect x="30" y="814" width="210" height="64" rx="8" fill="#3a2200" stroke="#c06020" stroke-width="1"/>
  <text class="nt" x="135" y="836" text-anchor="middle" dominant-baseline="central" fill="#f0a040">human_review</text>
  <text class="ns" x="135" y="857" text-anchor="middle" dominant-baseline="central" fill="#c07030">interrupt() · state persisted · resume CLI</text>
</g>

<!-- human_review → embed (re-joins center column) -->
<path d="M240 846 L460 846 L460 924"
      fill="none" stroke="#c06020" stroke-width="1.5" marker-end="url(#ar)"/>
<text class="el" x="350" y="840">corrected tags · human_reviewed=True</text>


<!-- ═══════════════════════════════════════════════════════════════
     STAGE 5 — EMBEDDING
═══════════════════════════════════════════════════════════════ -->
<line x1="460" y1="878" x2="460" y2="924" stroke="#5030a0" stroke-width="1.5" marker-end="url(#ar)"/>

<g class="nb" data-tip="OpenAI text-embedding-3-small (1536 dims). Chunks sent in batches of 100. Each chunk text includes section context prefix: '[Document: title] [Section: path]' for richer semantic encoding. Retries 3x with exponential backoff. Hard EXIT if all retries fail — embeddings are required for vector retrieval. Tracks total tokens used and estimated cost ($0.02/1M tokens).">
  <rect x="260" y="926" width="400" height="64" rx="8" fill="#1e1040" stroke="#5030a0" stroke-width="1"/>
  <text class="nt" x="460" y="948" text-anchor="middle" dominant-baseline="central" fill="#a080e0">embed</text>
  <text class="ns" x="460" y="969" text-anchor="middle" dominant-baseline="central" fill="#7050b0">text-embedding-3-small · 1536d · batch=100 · retry ×3</text>
</g>

<!-- embed → error (right) -->
<path d="M660 956 L700 956 L700 948 L708 948"
      fill="none" stroke="#882020" stroke-width="1.5" marker-end="url(#ar)"/>
<text class="el" x="664" y="951" fill="#884040">API failure</text>

<!-- embed error END (right) -->
<g class="nb" data-tip="Hard terminal. OpenAI embedding API failed after 3 retries. Document NOT written to Neo4j — no partial state in database. Re-run ingest_document.py when API is available. The same file can be re-submitted because no Neo4j Document node was created.">
  <rect x="710" y="926" width="180" height="44" rx="8" fill="#3a1010" stroke="#882020" stroke-width="1"/>
  <text class="nt" x="800" y="943" text-anchor="middle" dominant-baseline="central" fill="#e08080">END — embed error</text>
  <text class="ns" x="800" y="960" text-anchor="middle" dominant-baseline="central" fill="#a05050">no Neo4j write · safe to retry</text>
</g>

<!-- embed → neo4j_write -->
<line x1="460" y1="990" x2="460" y2="1018" stroke="#5030a0" stroke-width="1.5" marker-end="url(#ar)"/>
<text class="el" x="476" y="1010">success</text>
<text class="cl" x="460" y="1038" text-anchor="middle">embeddings attached to chunks · tokens_used · cost_usd in state</text>
<line x1="460" y1="1044" x2="460" y2="1094" stroke="#1a6644" stroke-width="1.5" marker-end="url(#ar)"/>


<!-- ═══════════════════════════════════════════════════════════════
     STAGE 6 — NEO4J WRITE (ATOMIC)
═══════════════════════════════════════════════════════════════ -->
<g class="nb" data-tip="Single Neo4j transaction for the entire document — all-or-nothing. Creates: Document node (id=SHA-256, title, file_path, ingested_at, chunk_count, language). iiRDS metadata nodes (Product, Component, LifecyclePhase, InformationType) with MERGE to avoid duplicates. Chunk nodes (id, text, content_type, section_path, position, token_count, embedding vector). Relationships: RELATES_TO_PRODUCT, RELATES_TO_COMPONENT, HAS_LIFECYCLE_PHASE, HAS_INFORMATION_TYPE, HAS_CHUNK. BM25 full-text index updated automatically. Vector index populated with 1536-dim embeddings. Full rollback on any write failure.">
  <rect x="260" y="1096" width="400" height="64" rx="8" fill="#0a2a1a" stroke="#1a6644" stroke-width="1"/>
  <text class="nt" x="460" y="1118" text-anchor="middle" dominant-baseline="central" fill="#70d0a0">neo4j_write</text>
  <text class="ns" x="460" y="1139" text-anchor="middle" dominant-baseline="central" fill="#40a070">atomic txn · Document + Chunks + iiRDS nodes + edges</text>
</g>

<!-- neo4j schema mini-annotations -->
<rect x="50" y="1096" width="192" height="64" rx="6" fill="#081610" stroke="#1a4028" stroke-width="0.8"/>
<text class="ns" x="146" y="1113" text-anchor="middle" dominant-baseline="central" fill="#40a060" font-size="10">(:Document)-[:HAS_CHUNK]→(:Chunk)</text>
<text class="ns" x="146" y="1128" text-anchor="middle" dominant-baseline="central" fill="#40a060" font-size="10">(:Document)-[:RELATES_TO_PRODUCT]</text>
<text class="ns" x="146" y="1143" text-anchor="middle" dominant-baseline="central" fill="#40a060" font-size="10">→(:Product | :Component | ...)</text>

<!-- neo4j → error (right) -->
<path d="M660 1128 L700 1128 L700 1118 L708 1118"
      fill="none" stroke="#882020" stroke-width="1.5" marker-end="url(#ar)"/>
<text class="el" x="664" y="1123" fill="#884040">write failed</text>

<!-- neo4j error END (right) -->
<g class="nb" data-tip="Hard terminal. Neo4j transaction rolled back — no partial document in the graph. Safe to retry once Neo4j is available. Check Neo4j logs for the specific constraint violation or connection error.">
  <rect x="710" y="1096" width="180" height="44" rx="8" fill="#3a1010" stroke="#882020" stroke-width="1"/>
  <text class="nt" x="800" y="1113" text-anchor="middle" dominant-baseline="central" fill="#e08080">END — write error</text>

<div id="tip"></div>
<script>
const tip=document.getElementById('tip');let hide;
document.querySelectorAll('.nb').forEach(n=>{
  n.addEventListener('mouseenter',e=>{
    const t=n.dataset.tip;if(!t)return;
    clearTimeout(hide);tip.textContent=t;tip.style.opacity='1';mv(e);
  });
  n.addEventListener('mousemove',mv);
  n.addEventListener('mouseleave',()=>{hide=setTimeout(()=>tip.style.opacity='0',100)});
});
function mv(e){
  const x=e.clientX+14,y=e.clientY+14,w=tip.offsetWidth,h=tip.offsetHeight;
  tip.style.left=(x+w>innerWidth?innerWidth-w-8:x)+'px';
  tip.style.top=(y+h>innerHeight?e.clientY-h-8:y)+'px';
}
</script>
