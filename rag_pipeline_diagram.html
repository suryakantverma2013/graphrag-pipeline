<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG Pipeline — LangGraph Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --outline:   #3a3f56;
      --outline2:  #2a2f45;
      --text:      #E8EAF6;
      --text2:     #9FA8DA;
      --font-sans: 'Roboto', sans-serif;
      --font-mono: 'Roboto Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 24px 56px;
    }
    .page-header { max-width: 1000px; margin: 0 auto 28px; }
    .page-header h1 { font-size: 21px; font-weight: 700; color: var(--text); }
    .page-header p  { margin-top: 5px; font-size: 12px; color: var(--text2); font-family: var(--font-mono); }

    .diagram-card {
      max-width: 1000px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--outline);
      border-radius: 14px;
      padding: 28px 20px 36px;
      overflow-x: auto;
    }

    .legend {
      display: flex; flex-wrap: wrap; gap: 12px 22px;
      margin-bottom: 24px; padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--outline2);
      border-radius: 10px;
    }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text2); }
    .lswatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .lline   { width: 20px; height: 0; border-top: 2px dashed #5F5E5A; }

    svg { display: block; width: 100%; min-width: 700px; }

    .nb { cursor: pointer; transition: opacity .15s; }
    .nb:hover { opacity: .8; }

    #tip {
      position: fixed; pointer-events: none;
      background: #1E2235; border: 1px solid #3949AB;
      border-radius: 8px; padding: 8px 12px;
      font-size: 12px; color: #C5CAE9;
      max-width: 280px; line-height: 1.55;
      z-index: 999; opacity: 0; transition: opacity .15s;
    }

    /* SVG text classes */
    .band  { font-family: 'Roboto Mono', monospace; font-size: 11px; fill: #5C6BC0; letter-spacing: .6px; }
    .ntitle{ font-family: 'Roboto Mono', monospace; font-size: 13px; font-weight: 500; }
    .nsub  { font-family: 'Roboto', sans-serif;     font-size: 11px; }
    .elbl  { font-family: 'Roboto', sans-serif;     font-size: 11px; fill: #7986CB; }
    .clbl  { font-family: 'Roboto Mono', monospace; font-size: 10px; fill: #546E7A; }
  </style>
</head>
<body>

<div class="page-header">
  <h1>RAG Pipeline — LangGraph Architecture</h1>
  <p>Technical document Q&amp;A · Neo4j · BGE Reranker · Docling · iiRDS</p>
</div>

<div class="diagram-card">

  <div class="legend">
    <div class="legend-item"><div class="lswatch" style="background:#534AB7;border:1px solid #7F77DD"></div>Pre-retrieval</div>
    <div class="legend-item"><div class="lswatch" style="background:#0F6E56;border:1px solid #1D9E75"></div>Retrieval</div>
    <div class="legend-item"><div class="lswatch" style="background:#854F0B;border:1px solid #BA7517"></div>Re-ranking</div>
    <div class="legend-item"><div class="lswatch" style="background:#185FA5;border:1px solid #378ADD"></div>Synthesis</div>
    <div class="legend-item"><div class="lswatch" style="background:#993C1D;border:1px solid #D85A30"></div>Human-in-loop</div>
    <div class="legend-item"><div class="lswatch" style="background:#444441;border:1px solid #888780"></div>I/O nodes</div>
    <div class="legend-item"><div class="lline"></div>Loop-back / fallback</div>
  </div>

  <!--
    COORDINATE SYSTEM  (viewBox 0 0 800 1200)
    ─────────────────────────────────────────
    INPUT                      y=20  h=44  bot=64
    ── PRE-RETRIEVAL band ──    y=84  bot=470
      detect_ambiguity         y=108 h=56  bot=164   cx=400
      refine_query (LEFT)      y=220 h=56  bot=276   x=30  w=190
      request_clarif (LEFT)    y=350 h=56  bot=406   x=30  w=190
      detect_complexity        y=220 h=56  bot=276   x=305 w=190 cx=400
      decompose (RIGHT)        y=220 h=56  bot=276   x=600 w=180
      prepare_retrieval        y=350 h=44  bot=394   x=220 w=360 cx=400
    ── RETRIEVAL band ──        y=490 bot=660
      classify_query           y=510 h=56  bot=566   x=220 w=360 cx=400
      bm25_retrieve            y=600 h=56  bot=656   x=20  w=210
      vector_retrieve          y=600 h=56  bot=656   x=295 w=210 cx=400
      graph_traverse           y=600 h=56  bot=656   x=570 w=210
    ── RERANKING band ──        y=680 bot=940
      cross_encoder_rerank     y=700 h=56  bot=756   x=170 w=460 cx=400
      assess_confidence        y=810 h=56  bot=866   x=170 w=460 cx=400
      escalate (RIGHT)         y=880 h=56  bot=936   x=620 w=160
    ── SYNTHESIS band ──        y=960 bot=1100
      synthesize_answer        y=980 h=56  bot=1036  x=170 w=460 cx=400
    END                        y=1070 h=44 bot=1114  x=230 w=340 cx=400
    viewBox height = 1140
  -->

  <svg viewBox="0 0 800 1155" xmlns="http://www.w3.org/2000/svg"
       role="img" aria-label="RAG Pipeline LangGraph Architecture Diagram">
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
              markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
              stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- ══ BAND BACKGROUNDS ══ -->
    <!-- Pre-retrieval -->
    <rect x="10" y="84" width="780" height="390" rx="10"
          fill="none" stroke="#2A3050" stroke-width="1" stroke-dasharray="5 4"/>
    <text class="band" x="26" y="101">PRE-RETRIEVAL LAYER</text>

    <!-- Retrieval -->
    <rect x="10" y="488" width="780" height="176" rx="10"
          fill="none" stroke="#1A2E28" stroke-width="1" stroke-dasharray="5 4"/>
    <text class="band" x="26" y="505">RETRIEVAL LAYER</text>

    <!-- Re-ranking -->
    <rect x="10" y="678" width="780" height="266" rx="10"
          fill="none" stroke="#2E2510" stroke-width="1" stroke-dasharray="5 4"/>
    <text class="band" x="26" y="695">RE-RANKING LAYER</text>

    <!-- Synthesis -->
    <rect x="10" y="958" width="780" height="142" rx="10"
          fill="none" stroke="#0E1E30" stroke-width="1" stroke-dasharray="5 4"/>
    <text class="band" x="26" y="975">SYNTHESIS LAYER</text>


    <!-- ══ INPUT ══ -->
    <g class="nb" data-tip="Entry point. The raw user query enters the pipeline and is stored in state as original_query.">
      <rect x="230" y="20" width="340" height="44" rx="8"
            fill="#2C2E3E" stroke="#888780" stroke-width="1"/>
      <text class="ntitle" x="400" y="42"
            text-anchor="middle" dominant-baseline="central" fill="#C8C8C8">original_query</text>
    </g>
    <!-- input → detect_ambiguity -->
    <line x1="400" y1="64" x2="400" y2="106"
          stroke="#5C6BC0" stroke-width="1.5" marker-end="url(#arr)"/>


    <!-- ══ PRE-RETRIEVAL ══ -->

    <!-- detect_ambiguity  cx=400  y=108 -->
    <g class="nb" data-tip="Checks if the query lacks specificity: missing model numbers, ambiguous pronouns, or multiple valid interpretations. Produces is_ambiguous flag and routes accordingly.">
      <rect x="220" y="108" width="360" height="56" rx="8"
            fill="#26215C" stroke="#7F77DD" stroke-width="1"/>
      <text class="ntitle" x="400" y="129"
            text-anchor="middle" dominant-baseline="central" fill="#CECBF6">detect_ambiguity</text>
      <text class="nsub"   x="400" y="150"
            text-anchor="middle" dominant-baseline="central" fill="#AFA9EC">Is the query clear enough?</text>
    </g>

    <!-- Ambiguous → left: arrow from left edge x=220 → refine_query right edge x=220 -->
    <path d="M220 136 L100 136 L100 220 L30 220"
          fill="none" stroke="#5C5490" stroke-width="1.5" marker-end="url(#arr)"/>
    <text class="elbl" x="130" y="131">Ambiguous</text>

    <!-- refine_query  x=30 y=220 w=190 -->
    <g class="nb" data-tip="Applies refinement: expands abbreviations, adds implicit domain context, resolves pronouns, adds scope qualifiers. Low-confidence results are flagged for human clarification.">
      <rect x="30" y="220" width="190" height="56" rx="8"
            fill="#26215C" stroke="#7F77DD" stroke-width="1"/>
      <text class="ntitle" x="125" y="241"
            text-anchor="middle" dominant-baseline="central" fill="#CECBF6">refine_query</text>
      <text class="nsub"   x="125" y="262"
            text-anchor="middle" dominant-baseline="central" fill="#AFA9EC">Apply refinement</text>
    </g>

    <!-- Low confidence → down-left to request_clarification -->
    <path d="M30 248 L12 248 L12 350 L30 350"
          fill="none" stroke="#5C5490" stroke-width="1.5" marker-end="url(#arr)"/>
    <!-- rotated label — placed in clear space -->
    <text class="elbl" x="8" y="300" text-anchor="middle"
          transform="rotate(-90 8 300)">Low conf.</text>

    <!-- request_clarification  x=30 y=350 w=190 -->
    <g class="nb" data-tip="Human-in-the-loop. When refinement confidence is below 0.6 a clarification question is surfaced. The user's response loops back to detect_ambiguity.">
      <rect x="30" y="350" width="190" height="56" rx="8"
            fill="#4A1B0C" stroke="#D85A30" stroke-width="1"/>
      <text class="ntitle" x="125" y="369"
            text-anchor="middle" dominant-baseline="central" fill="#F5C4B3">request_clarification</text>
      <text class="nsub"   x="125" y="390"
            text-anchor="middle" dominant-baseline="central" fill="#F0997B">Human-in-the-loop</text>
    </g>

    <!-- loops back dashed: from bottom of request_clarif up and right to detect_ambiguity top -->
    <path d="M125 406 L125 436 L400 436 L400 164"
          fill="none" stroke="#3D3B5C" stroke-width="1.2"
          stroke-dasharray="5 4" marker-end="url(#arr)"/>
    <text class="elbl" x="270" y="432">loops back</text>

    <!-- Refined → right back to detect_complexity entry -->
    <path d="M220 248 L250 248 L250 220 L305 220"
          fill="none" stroke="#5C5490" stroke-width="1.5" marker-end="url(#arr)"/>
    <text class="elbl" x="257" y="243">Refined</text>

    <!-- Clear path: detect_ambiguity bottom → detect_complexity top -->
    <line x1="400" y1="164" x2="400" y2="218"
          stroke="#5C6BC0" stroke-width="1.5" marker-end="url(#arr)"/>
    <text class="elbl" x="416" y="196">Clear</text>

    <!-- detect_complexity  x=305 y=220 w=190 cx=400 -->
    <g class="nb" data-tip="Determines if the query spans multiple concepts, documents, or reasoning steps. Routes to decompose_query if complex, otherwise directly to prepare_retrieval.">
      <rect x="305" y="220" width="190" height="56" rx="8"
            fill="#26215C" stroke="#7F77DD" stroke-width="1"/>
      <text class="ntitle" x="400" y="241"
            text-anchor="middle" dominant-baseline="central" fill="#CECBF6">detect_complexity</text>
      <text class="nsub"   x="400" y="262"
            text-anchor="middle" dominant-baseline="central" fill="#AFA9EC">Single or multi-part?</text>
    </g>

    <!-- Complex → right to decompose -->
    <path d="M495 248 L560 248 L560 220 L600 220"
          fill="none" stroke="#5C5490" stroke-width="1.5" marker-end="url(#arr)"/>
    <text class="elbl" x="510" y="243">Complex</text>

    <!-- decompose_query  x=600 y=220 w=180 -->
    <g class="nb" data-tip="Decomposes complex queries into atomic sub-queries each addressing one concept. Supports sequential, parallel, and hierarchical aggregation strategies.">
      <rect x="600" y="220" width="178" height="56" rx="8"
            fill="#26215C" stroke="#7F77DD" stroke-width="1"/>
      <text class="ntitle" x="689" y="241"
            text-anchor="middle" dominant-baseline="central" fill="#CECBF6">decompose_query</text>
      <text class="nsub"   x="689" y="262"
            text-anchor="middle" dominant-baseline="central" fill="#AFA9EC">Split sub-queries</text>
    </g>

    <!-- decompose → prepare_retrieval via bottom path -->
    <path d="M689 276 L689 320 L400 320 L400 348"
          fill="none" stroke="#5C5490" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Simple path: detect_complexity → prepare_retrieval -->
    <line x1="400" y1="276" x2="400" y2="348"
          stroke="#5C6BC0" stroke-width="1.5" marker-end="url(#arr)"/>
    <text class="elbl" x="416" y="316">Simple</text>

    <!-- prepare_retrieval  x=220 y=350 w=360 -->
    <g class="nb" data-tip="Normalises both simple and decomposed paths into a uniform list structure so downstream retrieval nodes handle both cases identically.">
      <rect x="220" y="350" width="360" height="44" rx="8"
            fill="#26215C" stroke="#7F77DD" stroke-width="1"/>
      <text class="ntitle" x="400" y="372"
            text-anchor="middle" dominant-baseline="central" fill="#CECBF6">prepare_retrieval</text>
    </g>


    <!-- ══ RETRIEVAL ══ -->

    <!-- prepare → classify -->
    <line x1="400" y1="394" x2="400" y2="508"
          stroke="#5C6BC0" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- classify_query  x=220 y=510 w=360 -->
    <g class="nb" data-tip="Classifies query as exact_lookup, conceptual, procedural, or relational. Routes to BM25 for part numbers, graph traversal for relationships, or vector search for semantic queries.">
      <rect x="220" y="510" width="360" height="56" rx="8"
            fill="#085041" stroke="#1D9E75" stroke-width="1"/>
      <text class="ntitle" x="400" y="531"
            text-anchor="middle" dominant-baseline="central" fill="#9FE1CB">classify_query</text>
      <text class="nsub"   x="400" y="552"
            text-anchor="middle" dominant-baseline="central" fill="#5DCAA5">Route by query type</text>
    </g>

    <!-- fan-out arrows: classify → 3 retrievers at y=600 -->
    <!-- left to bm25 cx=125 -->
    <path d="M290 566 L125 566 L125 598"
          fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
    <!-- center to vector cx=400 -->
    <line x1="400" y1="566" x2="400" y2="598"
          stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
    <!-- right to graph cx=675 -->
    <path d="M510 566 L675 566 L675 598"
          fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- bm25_retrieve  x=20 y=600 w=210 cx=125 -->
    <g class="nb" data-tip="BM25 full-text search via Apache Lucene (Neo4j full-text index). Best for exact technical terms, part numbers, model codes, and specification values.">
      <rect x="20" y="600" width="210" height="56" rx="8"
            fill="#085041" stroke="#1D9E75" stroke-width="1"/>
      <text class="ntitle" x="125" y="621"
            text-anchor="middle" dominant-baseline="central" fill="#9FE1CB">bm25_retrieve</text>
      <text class="nsub"   x="125" y="642"
            text-anchor="middle" dominant-baseline="central" fill="#5DCAA5">Exact term match</text>
    </g>

    <!-- vector_retrieve  x=295 y=600 w=210 cx=400 -->
    <g class="nb" data-tip="Vector similarity search using Neo4j vector index and cosine similarity. Best for natural language queries, synonyms, and paraphrased questions.">
      <rect x="295" y="600" width="210" height="56" rx="8"
            fill="#085041" stroke="#1D9E75" stroke-width="1"/>
      <text class="ntitle" x="400" y="621"
            text-anchor="middle" dominant-baseline="central" fill="#9FE1CB">vector_retrieve</text>
      <text class="nsub"   x="400" y="642"
            text-anchor="middle" dominant-baseline="central" fill="#5DCAA5">Semantic similarity</text>
    </g>

    <!-- graph_traverse  x=570 y=600 w=210 cx=675 -->
    <g class="nb" data-tip="Neo4j Cypher traversal using iiRDS-mapped relationships. Best for relational queries — components, procedures, warnings, and product-lifecycle connections.">
      <rect x="570" y="600" width="210" height="56" rx="8"
            fill="#085041" stroke="#1D9E75" stroke-width="1"/>
      <text class="ntitle" x="675" y="621"
            text-anchor="middle" dominant-baseline="central" fill="#9FE1CB">graph_traverse</text>
      <text class="nsub"   x="675" y="642"
            text-anchor="middle" dominant-baseline="central" fill="#5DCAA5">Relationship traversal</text>
    </g>

    <!-- merge arrows → cross_encoder_rerank at y=700 cx=400 -->
    <path d="M125 656 L125 670 L368 670"
          fill="none" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="400" y1="656" x2="400" y2="698"
          stroke="#546E7A" stroke-width="1.5" marker-end="url(#arr)"/>
    <path d="M675 656 L675 670 L432 670"
          fill="none" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arr)"/>
    <text class="clbl" x="400" y="688" text-anchor="middle">Top-50 candidates merged</text>


    <!-- ══ RE-RANKING ══ -->

    <!-- cross_encoder_rerank  x=170 y=700 w=460 cx=400 -->
    <g class="nb" data-tip="BGE reranker (BAAI/bge-reranker-v2-m3). Scores each candidate chunk jointly with the query using full cross-attention — far more accurate than bi-encoder cosine similarity. Runs fully locally.">
      <rect x="170" y="700" width="460" height="56" rx="8"
            fill="#2E1F00" stroke="#BA7517" stroke-width="1"/>
      <text class="ntitle" x="400" y="721"
            text-anchor="middle" dominant-baseline="central" fill="#FAC775">cross_encoder_rerank</text>
      <text class="nsub"   x="400" y="742"
            text-anchor="middle" dominant-baseline="central" fill="#EF9F27">BGE reranker — joint query + doc scoring</text>
    </g>

    <!-- cross_encoder → assess_confidence -->
    <line x1="400" y1="756" x2="400" y2="808"
          stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>
    <text class="clbl" x="440" y="787">Top-10 re-ranked</text>

    <!-- assess_confidence  x=170 y=810 w=460 cx=400 -->
    <g class="nb" data-tip="Derives a confidence signal from cross-encoder scores: top score magnitude, average of top-3, and score gap between rank-1 and rank-2. Routes low-confidence results to human escalation.">
      <rect x="170" y="810" width="460" height="56" rx="8"
            fill="#2E1F00" stroke="#BA7517" stroke-width="1"/>
      <text class="ntitle" x="400" y="831"
            text-anchor="middle" dominant-baseline="central" fill="#FAC775">assess_confidence</text>
      <text class="nsub"   x="400" y="852"
            text-anchor="middle" dominant-baseline="central" fill="#EF9F27">Score gap + top-K signal</text>
    </g>

    <!-- Low confidence → right to escalate  x=620 y=880 w=160 -->
    <path d="M630 838 L770 838 L770 880 L782 880"
          fill="none" stroke="#993C1D" stroke-width="1.5"/>
    <path d="M630 838 L782 838 L782 908 L782 880"
          fill="none" stroke="none"/>
    <!-- cleaner: horizontal then down -->
    <path d="M630 838 L760 838 L760 908 L622 908"
          fill="none" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arr)"/>
    <text class="elbl" x="650" y="832">Low conf.</text>

    <!-- escalate_to_human  x=620 y=910 w=160 cx=700 -->
    <g class="nb" data-tip="Human escalation node. Triggered when composite confidence score is below 0.4. Surfaces the low-confidence result for expert review before returning an answer.">
      <rect x="620" y="910" width="160" height="56" rx="8"
            fill="#4A1B0C" stroke="#D85A30" stroke-width="1"/>
      <text class="ntitle" x="700" y="931"
            text-anchor="middle" dominant-baseline="central" fill="#F5C4B3">escalate</text>
      <text class="nsub"   x="700" y="952"
            text-anchor="middle" dominant-baseline="central" fill="#F0997B">Human review</text>
    </g>

    <!-- High confidence → down to synthesize -->
    <line x1="400" y1="866" x2="400" y2="978"
          stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>
    <text class="elbl" x="416" y="926">High conf.</text>


    <!-- ══ SYNTHESIS ══ -->

    <!-- synthesize_answer  x=170 y=980 w=460 cx=400 -->
    <g class="nb" data-tip="LLM synthesis over the top-10 re-ranked chunks. For decomposed queries, sub-query results are aggregated via Reciprocal Rank Fusion before being passed to the LLM context window.">
      <rect x="170" y="980" width="460" height="56" rx="8"
            fill="#042C53" stroke="#378ADD" stroke-width="1"/>
      <text class="ntitle" x="400" y="1001"
            text-anchor="middle" dominant-baseline="central" fill="#B5D4F4">synthesize_answer</text>
      <text class="nsub"   x="400" y="1022"
            text-anchor="middle" dominant-baseline="central" fill="#85B7EB">LLM over top-10 re-ranked chunks</text>
    </g>

    <!-- synthesize → END -->
    <line x1="400" y1="1036" x2="400" y2="1070"
          stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- END  x=230 y=1072 w=340 cx=400 -->
    <g class="nb" data-tip="Terminal node. Returns the synthesised answer to the user.">
      <rect x="230" y="1072" width="340" height="44" rx="8"
            fill="#2C2E3E" stroke="#888780" stroke-width="1"/>
      <text class="ntitle" x="400" y="1094"
            text-anchor="middle" dominant-baseline="central" fill="#C8C8C8">END — final answer</text>
    </g>

  </svg>
</div>

<div id="tip"></div>

<script>
  const tip = document.getElementById('tip');
  let hide;
  document.querySelectorAll('.nb').forEach(n => {
    n.addEventListener('mouseenter', e => {
      const t = n.dataset.tip; if (!t) return;
      clearTimeout(hide);
      tip.textContent = t;
      tip.style.opacity = '1';
      move(e);
    });
    n.addEventListener('mousemove', move);
    n.addEventListener('mouseleave', () => {
      hide = setTimeout(() => tip.style.opacity = '0', 100);
    });
  });
  function move(e) {
    const x = e.clientX + 14, y = e.clientY + 14;
    const w = tip.offsetWidth, h = tip.offsetHeight;
    tip.style.left = (x + w > innerWidth  ? innerWidth  - w - 8 : x) + 'px';
    tip.style.top  = (y + h > innerHeight ? e.clientY - h - 8  : y) + 'px';
  }
</script>
</body>
</html>
